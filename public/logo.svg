<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0DCFCF"/>
      <stop offset="100%" style="stop-color:#0AA8C7"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f9f9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0DCFCF" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="76" height="76" rx="18" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Toolbox body -->
  <rect x="16" y="36" width="48" height="30" rx="5" fill="white" opacity="0.95"/>

  <!-- Toolbox lid -->
  <rect x="20" y="26" width="40" height="14" rx="4" fill="white" opacity="0.75"/>

  <!-- Handle -->
  <path d="M30 26 Q40 16 50 26" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Play triangle (teal on white box) -->
  <polygon points="31,44 31,60 52,52" fill="url(#bgGrad)"/>
</svg>
